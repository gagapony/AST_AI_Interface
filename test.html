* {

body {

}

#controls {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #f5f5f5;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
  z-index: 1000;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

#search-input {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  width: 300px;
  font-size: 14px;
}

#match-count {
  font-size: 12px;
  color: #666;
}

.toolbar {
  display: flex;
  gap: 10px;
}

select, button {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #e0e0e0;
}

#graph-container {
  position: absolute;
  top: 50px;
  left: 0;
  right: 0;
  bottom: 0;
}

/* Dark theme */
body.dark-theme {
  background: #1a1a1a;
}

body.dark-theme #controls {
  background: #2a2a2a;
  border-bottom: 1px solid #444;
}

body.dark-theme #search-input,
body.dark-theme select,
body.dark-theme button {
  background: #333;
  border-color: #555;
  color: #fff;
}

body.dark-theme button:hover {
  background: #444;
}

body.dark-theme #match-count {
  color: #aaa;
}

/* Light theme */
body.light-theme {
  background: #fafafa;
}

body.light-theme #controls {
  background: #ffffff;
  border-bottom: 1px solid #e0e0e0;
}

let chart;
let originalNodes = [];
let originalEdges = [];
let visibleNodes = [];
let visibleEdges = [];

document.addEventListener('DOMContentLoaded', function() {
  initGraph();
  setupEventListeners();
});

function initGraph() {
  const container = document.getElementById('graph-container');
  chart = echarts.init(container);

  // Store original data for filtering
  originalNodes = [...GRAPH_DATA.nodes];
  originalEdges = [...GRAPH_DATA.edges];
  visibleNodes = [...originalNodes];
  visibleEdges = [...originalEdges];

  const option = {
    title: {
      text: 'File Call Graph',
      left: 'center',
      top: 10
    },
    tooltip: {
      formatter: tooltipFormatter
    },
    series: [{
      type: 'graph',
      layout: 'force',
      data: visibleNodes,
      links: visibleEdges,
      categories: GRAPH_DATA.categories,
      roam: true,
      draggable: true,
      label: {
        show: true,
        position: 'inside',
        formatter: function(params) {
          return params.data.name;
        },
        color: '#fff',
        fontSize: 12,
        fontWeight: 'bold'
      },
      force: {
        repulsion: 500,
        edgeLength: 100,
        gravity: 0.1,
        layoutAnimation: true,
        preventOverlap: true
      },
      edgeLabel: {
        show: true,
        position: 'middle',
        formatter: function(params) {
          return params.data.label || '';
        },
        fontSize: 10,
        color: '#666'
      },
      edgeSymbol: ['circle', 'arrow'],
      edgeSymbolSize: [4, 8],
      lineStyle: {
        width: 2,
        curveness: 0.1
      },
      emphasis: {
        focus: 'adjacency'
      }
    }]
  };

  chart.setOption(option);
}

function tooltipFormatter(params) {
  const data = params.data;

  // File node tooltip
  return `
    <div style="padding: 8px; font-family: Arial, sans-serif; max-width: 300px;">
      <strong style="font-size: 14px;">${data.name}</strong><br/>
      <span style="color: #666;">Functions:</span> ${data.functionCount}<br/>
      <span style="color: #666;">Outgoing calls:</span> ${data.outgoingCount}<br/>
      <span style="color: #666;">Incoming calls:</span> ${data.incomingCount}
      ${data.callDetails ? `<br/><hr/><span style="color: #666; font-size: 12px;">Calls:</span><br/>${data.callDetails}` : ''}
    </div>
  `;
}

function handleSearch(query) {
  const lowerQuery = query.toLowerCase().trim();

  if (!query || query.trim() === '') {
    visibleNodes = [...originalNodes];
    visibleEdges = [...originalEdges];
    updateChartData(visibleNodes, visibleEdges);
    document.getElementById('match-count').textContent = '';
    return;
  }

  // Search nodes
  const matchingNodes = originalNodes.filter(node =>
    node.name.toLowerCase().includes(lowerQuery)
  );

  if (matchingNodes.length === 0) {
    visibleNodes = [];
    visibleEdges = [];
    updateChartData(visibleNodes, visibleEdges);
    document.getElementById('match-count').textContent = '0 matches';
    return;
  }

  // Get matching node IDs and their neighbors
  const matchingIds = new Set(matchingNodes.map(n => n.id));
  const neighborIds = new Set();

  matchingNodes.forEach(node => {
    originalEdges.forEach(edge => {
      if (edge.source === node.id) {
        neighborIds.add(edge.target);
      } else if (edge.target === node.id) {
        neighborIds.add(edge.source);
      }
    });
  });

  // Build visible set
  const visibleIds = new Set([...matchingIds, ...neighborIds]);

  // Filter nodes
  visibleNodes = originalNodes.filter(node => visibleIds.has(node.id));

  // Filter edges
  visibleEdges = originalEdges.filter(edge =>
    visibleIds.has(edge.source) && visibleIds.has(edge.target)
  );

  updateChartData(visibleNodes, visibleEdges);
  document.getElementById('match-count').textContent = `${matchingNodes.length} 个文件匹配`;

}

function updateChartData(nodes, edges) {
  chart.setOption({
    series: [{
      data: nodes,
      links: edges
    }]
  });
}

function handleThemeChange(theme) {
  const body = document.body;

  body.classList.remove('dark-theme', 'light-theme');

  switch (theme) {
    case 'dark':
      body.classList.add('dark-theme');
      chart.setOption({
        backgroundColor: '#1a1a1a',
        textStyle: { color: '#ffffff' }
      });
      break;
    case 'light':
      body.classList.add('light-theme');
      chart.setOption({
        backgroundColor: '#ffffff',
        textStyle: { color: '#333333' }
      });
      break;
    default:
      chart.setOption({
        backgroundColor: 'transparent',
        textStyle: { color: '#333333' }
      });
  }
}

function handleExportPNG() {
  const url = chart.getDataURL({
    type: 'png',
    pixelRatio: 2,
    backgroundColor: '#fff'
  });

  const link = document.createElement('a');
  link.href = url;
  link.download = `filegraph_${getTimestamp()}.png`;
  link.click();
}

function handleExportSVG() {
  const svgElement = chart.getDom().querySelector('svg');
  const serializer = new XMLSerializer();
  const svgString = serializer.serializeToString(svgElement);

  const blob = new Blob([svgString], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);

  const link = document.createElement('a');
  link.href = url;
  link.download = `filegraph_${getTimestamp()}.svg`;
  link.click();

  URL.revokeObjectURL(url);
}

function getTimestamp() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const hour = String(now.getHours()).padStart(2, '0');
  const minute = String(now.getMinutes()).padStart(2, '0');
  const second = String(now.getSeconds()).padStart(2, '0');
  return `${year}${month}${day}_${hour}${minute}${second}`;
}

function setupEventListeners() {
  const searchInput = document.getElementById('search-input');
  let searchTimeout;

  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      handleSearch(e.target.value);
    }, 300);
  });

  document.getElementById('theme-select').addEventListener('change', (e) => {
    handleThemeChange(e.target.value);
  });

  document.getElementById('export-png').addEventListener('click', handleExportPNG);
  document.getElementById('export-svg').addEventListener('click', handleExportSVG);
  document.getElementById('reset-view').addEventListener('click', () => {
    chart.dispatchAction({ type: 'restore' });
  });

  window.addEventListener('resize', () => {
    chart.resize();
  });
}

  </script>
