# clang-call-analyzer configuration
# This file demonstrates the generic flag filtering configuration

# Flag filtering configuration
flag_filter:
  # Enable adaptive retry (default: true)
  enable_retry: true

  # Max retry attempts (default: 3)
  max_retries: 3

  # Custom whitelist categories (optional)
  # Format: {category_name: [flag_patterns]}
  # Example: Add experimental flags to whitelist
  custom_whitelist:
    # Example: Uncomment to add experimental flags
    # experimental:
    #   - "^-fno-rtti$"
    #   - "^-fno-exceptions$"

    # Example: Uncomment to add cross-compilation target flags
    # cross_compile:
    #   - "^--target=arm-linux-gnueabihf$"
    #   - "^--target=riscv32-unknown-elf$"
    #   - "^--target=xtensa-esp32-elf$"

# Note: The default whitelist includes:
#   - include_paths: -I, -isystem, -idirafter, -iquote, -F
#   - macros: -D, -U
#   - language: -std=c++, -std=c, -x
#   - target: -target, --target=
#   - warnings: -W*, -w
#   - compatibility: -f*, -m32, -m64
#
# The blacklist always excludes:
#   - Output control: -o, -c, -S, -E
#   - Linker flags: -l, -L, -Wl,, -shared, -static
#   - Architecture flags: -march=, -mtune=, -mabi=, -mcpu=, -mthumb, -mfpu=
#   - Linker options: -nostartfiles, -nodefaultlibs, -nostdlib, -e
#   - Build artifacts: -MF, -MT, -MMD
#   - Optimization flags: -O*, -flto
#   - Other: -pipe, -g, -ggdb, -fvisibility=
